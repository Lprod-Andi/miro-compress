<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miro Bildkompressor</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #f0f4f8;
      --text: #17202e;
      --muted: #65758b;
      --line: #d9e0ea;
      --line-strong: #b9c4d3;
      --primary: #1a73e8;
      --primary-ink: #ffffff;
      --ok: #168a45;
      --warn: #a36b00;
      --bad: #c9372c;
      --shadow: 0 10px 26px rgba(21, 31, 48, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      font-size: 14px;
      line-height: 1.4;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      min-height: 100vh;
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: 24px;
      line-height: 1.08;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
    }

    .status-pill.connected .status-dot { background: var(--ok); }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #e9eef5;
    }

    .tab-button {
      min-width: 0;
      height: 36px;
      border-radius: 6px;
      background: transparent;
      color: #3f4d5f;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }

    .tab-button.active {
      background: var(--panel);
      color: var(--primary);
      box-shadow: 0 1px 4px rgba(19, 29, 44, 0.12);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .metric span {
      display: block;
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .metric strong {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 16px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .settings {
      display: grid;
      gap: 12px;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .segmented legend,
    .field > span {
      color: #3f4d5f;
      font-size: 12px;
      font-weight: 800;
    }

    .segmented legend {
      grid-column: 1 / -1;
      margin-bottom: 2px;
    }

    .segmented label {
      position: relative;
      min-width: 0;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
    }

    .segmented label span {
      display: block;
      overflow: hidden;
      padding: 9px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: #3f4d5f;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .segmented input:checked + span {
      border-color: var(--primary);
      background: #e8f1ff;
      color: #1457b9;
      font-weight: 800;
    }

    .field {
      display: grid;
      grid-template-columns: minmax(92px, 1fr) minmax(96px, 1.6fr) auto;
      align-items: center;
      gap: 10px;
    }

    .field input[type="number"] {
      grid-column: 2 / -1;
    }

    .field input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
    }

    .field output {
      min-width: 42px;
      color: var(--text);
      font-weight: 800;
      text-align: right;
    }

    input[type="number"] {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-weight: 700;
    }

    .check-row {
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: start;
      gap: 9px;
      color: #273648;
    }

    .check-row input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      accent-color: var(--primary);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .button {
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
    }

    .button.primary {
      background: var(--primary);
      color: var(--primary-ink);
    }

    .button.secondary {
      border: 1px solid var(--line-strong);
      background: var(--panel);
      color: #25364c;
    }

    .button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .progress-head,
    .summary-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .progress-head {
      margin-bottom: 8px;
      color: var(--text);
      font-weight: 900;
    }

    .summary-line {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .progress-track {
      overflow: hidden;
      height: 8px;
      border-radius: 999px;
      background: #e4e9f2;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--primary);
      transition: width 180ms ease;
    }

    .drop-zone {
      display: grid;
      gap: 8px;
      padding: 18px 12px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      background: #fbfcfe;
      text-align: center;
    }

    .drop-zone.dragover {
      border-color: var(--primary);
      background: #eaf2ff;
    }

    .drop-zone strong {
      color: var(--text);
      font-size: 14px;
    }

    .drop-zone span {
      color: var(--muted);
      font-size: 12px;
    }

    .file-input {
      display: none;
    }

    .file-list,
    .log-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .file-row,
    .log-row,
    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .file-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px;
    }

    .file-row strong,
    .log-row strong {
      display: block;
      overflow-wrap: anywhere;
      color: var(--text);
      font-size: 13px;
    }

    .file-row span,
    .log-row p,
    .empty {
      color: var(--muted);
      font-size: 12px;
    }

    .file-row span {
      display: block;
      margin-top: 2px;
    }

    .mini-button {
      align-self: center;
      min-width: 78px;
      height: 30px;
      padding: 0 9px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: var(--panel);
      color: #25364c;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .log-row {
      display: grid;
      grid-template-columns: 10px 1fr;
      gap: 9px;
      padding: 10px;
    }

    .log-row p {
      margin: 2px 0 0;
    }

    .log-dot {
      width: 8px;
      height: 8px;
      margin-top: 5px;
      border-radius: 50%;
      background: var(--muted);
    }

    .log-row.done .log-dot { background: var(--ok); }
    .log-row.skipped .log-dot { background: var(--warn); }
    .log-row.error .log-dot { background: var(--bad); }

    .empty {
      padding: 12px;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 430px) {
      .app { padding: 16px 12px 22px; }
      .topbar { align-items: flex-start; }
      h1 { font-size: 22px; }
      .status-pill { padding-inline: 8px; }
      .metrics { gap: 6px; }
      .metric { padding: 9px 8px; }
      .field { grid-template-columns: minmax(86px, 1fr) minmax(80px, 1.4fr) auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Miro Board Tool</p>
        <h1>Bildkompressor</h1>
      </div>
      <div id="connection" class="status-pill">
        <span class="status-dot"></span>
        <span id="connection-label">Lokal</span>
      </div>
    </header>

    <nav class="tabs" aria-label="Werkzeugbereich">
      <button id="tab-board" class="tab-button active" type="button">Board</button>
      <button id="tab-upload" class="tab-button" type="button">Vor Einfuegen</button>
    </nav>

    <section class="metrics" aria-live="polite">
      <div class="metric">
        <span>Auswahl</span>
        <strong id="metric-selection">0</strong>
      </div>
      <div class="metric">
        <span>Bearbeitet</span>
        <strong id="metric-done">0</strong>
      </div>
      <div class="metric">
        <span>Gespart</span>
        <strong id="metric-saved">0 B</strong>
      </div>
    </section>

    <section class="stack">
      <form id="settings-form" class="card settings">
        <fieldset id="scope-fieldset" class="segmented">
          <legend>Bereich</legend>
          <label>
            <input type="radio" name="scope" value="selection" checked />
            <span>Auswahl</span>
          </label>
          <label>
            <input type="radio" name="scope" value="board" />
            <span>Ganzes Board</span>
          </label>
        </fieldset>

        <label class="field">
          <span>Max. Kante</span>
          <input name="maxEdge" type="number" min="320" max="4096" step="80" value="1600" />
        </label>

        <label class="field">
          <span>JPEG-Qualitaet</span>
          <input id="quality-input" name="quality" type="range" min="45" max="92" step="1" value="72" />
          <output id="quality-output">72%</output>
        </label>

        <label class="check-row">
          <input name="onlyIfSmaller" type="checkbox" checked />
          <span>Nur ersetzen, wenn die Datei kleiner wird</span>
        </label>

        <label class="check-row">
          <input name="keepPng" type="checkbox" />
          <span>PNG als PNG behalten</span>
        </label>

        <label class="check-row">
          <input name="rasterizeSpecial" type="checkbox" />
          <span>GIF/SVG trotzdem rasterisieren</span>
        </label>
      </form>

      <section id="board-panel" class="stack">
        <div class="actions">
          <button id="refresh-button" class="button secondary" type="button">Aktualisieren</button>
          <button id="compress-board-button" class="button primary" type="button">Komprimieren</button>
        </div>
      </section>

      <section id="upload-panel" class="stack hidden">
        <label id="drop-zone" class="drop-zone" for="file-input">
          <strong>Bilder auswaehlen</strong>
          <span>JPG, PNG, GIF oder SVG werden lokal gelesen und vor Miro verkleinert.</span>
        </label>
        <input id="file-input" class="file-input" type="file" accept="image/*" multiple />
        <div class="actions">
          <button id="clear-files-button" class="button secondary" type="button">Leeren</button>
          <button id="insert-files-button" class="button primary" type="button">In Miro einfuegen</button>
        </div>
        <ol id="file-list" class="file-list"></ol>
      </section>

      <div class="actions">
        <button id="cancel-button" class="button secondary" type="button" disabled>Abbrechen</button>
      </div>

      <section class="card">
        <div class="progress-head">
          <span id="progress-label">Bereit</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
        </div>
        <div class="summary-line">
          <span id="summary-skipped">0 uebersprungen</span>
          <span id="summary-failed">0 Fehler</span>
        </div>
      </section>

      <section>
        <ol id="log-list" class="log-list"></ol>
      </section>
    </section>
  </main>

  <script>
    const state = {
      mode: 'board',
      selectedCount: 0,
      running: false,
      cancelRequested: false,
      files: [],
      summary: { total: 0, done: 0, skipped: 0, failed: 0, savedBytes: 0 },
      entries: [],
    };

    const els = {};

    document.addEventListener('DOMContentLoaded', () => {
      cacheElements();
      bindUi();
      wireMiroEntryPoint();
      renderAll();
      refreshSelectionCount();
    });

    function cacheElements() {
      for (const id of [
        'connection', 'connection-label', 'tab-board', 'tab-upload', 'metric-selection',
        'metric-done', 'metric-saved', 'scope-fieldset', 'quality-input', 'quality-output',
        'board-panel', 'upload-panel', 'refresh-button', 'compress-board-button',
        'drop-zone', 'file-input', 'clear-files-button', 'insert-files-button', 'file-list',
        'cancel-button', 'progress-label', 'progress-percent', 'progress-fill',
        'summary-skipped', 'summary-failed', 'log-list',
      ]) {
        els[id] = document.getElementById(id);
      }
    }

    function bindUi() {
      els['tab-board'].addEventListener('click', () => setMode('board'));
      els['tab-upload'].addEventListener('click', () => setMode('upload'));
      els['refresh-button'].addEventListener('click', refreshSelectionCount);
      els['compress-board-button'].addEventListener('click', () => runBoardCompression(readSettings()));
      els['cancel-button'].addEventListener('click', () => {
        state.cancelRequested = true;
        addEntry('Abbruch angefordert', 'Der aktuelle Schritt wird noch beendet.', 'skipped');
        renderAll();
      });
      els['quality-input'].addEventListener('input', () => {
        els['quality-output'].textContent = `${els['quality-input'].value}%`;
      });
      els['file-input'].addEventListener('change', (event) => addFiles(Array.from(event.target.files || [])));
      els['clear-files-button'].addEventListener('click', clearFiles);
      els['insert-files-button'].addEventListener('click', () => runFileInsert(readSettings()));

      for (const eventName of ['dragenter', 'dragover']) {
        els['drop-zone'].addEventListener(eventName, (event) => {
          event.preventDefault();
          els['drop-zone'].classList.add('dragover');
        });
      }
      for (const eventName of ['dragleave', 'drop']) {
        els['drop-zone'].addEventListener(eventName, (event) => {
          event.preventDefault();
          els['drop-zone'].classList.remove('dragover');
        });
      }
      els['drop-zone'].addEventListener('drop', (event) => {
        addFiles(Array.from(event.dataTransfer?.files || []).filter((file) => file.type.startsWith('image/')));
      });
    }

    function wireMiroEntryPoint() {
      if (!hasMiro()) {
        setConnection(false);
        return;
      }

      setConnection(true);
      window.miro.board.ui.on('icon:click', async () => {
        await window.miro.board.ui.openPanel({
          url: window.location.href.split('#')[0],
        });
      });
    }

    function setConnection(connected) {
      els.connection.classList.toggle('connected', connected);
      els['connection-label'].textContent = connected ? 'Miro' : 'Lokal';
    }

    function setMode(mode) {
      if (state.running) return;
      state.mode = mode;
      renderAll();
    }

    async function refreshSelectionCount() {
      try {
        if (!hasMiro()) {
          state.selectedCount = 0;
          renderAll();
          return;
        }
        const selection = await window.miro.board.getSelection();
        state.selectedCount = selection.filter(isImageItem).length;
      } catch {
        state.selectedCount = 0;
      }
      renderAll();
    }

    async function runBoardCompression(settings) {
      if (!hasMiro()) {
        resetRun(0);
        addEntry('Nur in Miro verfuegbar', 'Installiere die App im Board und starte sie dort.', 'error');
        state.summary.failed = 1;
        renderAll();
        return;
      }

      startRun();

      try {
        const items = settings.scope === 'selection'
          ? await window.miro.board.getSelection()
          : await window.miro.board.get({ type: 'image' });
        const images = items.filter(isImageItem);
        state.summary.total = images.length;
        renderAll();

        if (images.length === 0) {
          addEntry('Keine Bilder gefunden', settings.scope === 'selection' ? 'Markiere Bilder auf dem Board und starte erneut.' : 'Auf dem Board wurden keine Bilder gefunden.', 'skipped');
          state.summary.skipped = 1;
          return;
        }

        for (const image of images) {
          if (state.cancelRequested) break;
          await compressExistingImage(image, settings);
          renderAll();
          await wait(250);
        }

        notify(`Fertig: ${state.summary.done} Bilder ersetzt, ${formatBytes(state.summary.savedBytes)} gespart.`);
      } catch (error) {
        state.summary.failed += 1;
        addEntry('Lauf gestoppt', messageFrom(error), 'error');
      } finally {
        finishRun();
      }
    }

    async function compressExistingImage(image, settings) {
      const title = image.title?.trim() || `Bild ${image.id}`;
      try {
        const originalDataUrl = await image.getDataUrl('original');
        const mime = getDataUrlMime(originalDataUrl);

        if (!settings.rasterizeSpecial && shouldSkipMime(mime)) {
          state.summary.skipped += 1;
          addEntry(title, `${mime} bleibt unveraendert.`, 'skipped');
          return;
        }

        const result = await compressDataUrl(originalDataUrl, settings);
        const savedBytes = result.originalBytes - result.compressedBytes;

        if (settings.onlyIfSmaller && savedBytes <= 0) {
          state.summary.skipped += 1;
          addEntry(title, `Schon klein genug (${formatBytes(result.originalBytes)} -> ${formatBytes(result.compressedBytes)}).`, 'skipped');
          return;
        }

        image.url = result.dataUrl;
        await image.sync();
        if (typeof image.setMetadata === 'function') {
          await image.setMetadata('bildkompressor', {
            compressedAt: new Date().toISOString(),
            originalBytes: result.originalBytes,
            compressedBytes: result.compressedBytes,
            sourceSize: `${result.sourceWidth}x${result.sourceHeight}`,
            targetSize: `${result.targetWidth}x${result.targetHeight}`,
            outputMime: result.outputMime,
          });
        }

        state.summary.done += 1;
        state.summary.savedBytes += Math.max(0, savedBytes);
        addEntry(title, `${formatBytes(result.originalBytes)} -> ${formatBytes(result.compressedBytes)} (${result.targetWidth}x${result.targetHeight}).`, 'done');
      } catch (error) {
        state.summary.failed += 1;
        addEntry(title, messageFrom(error), 'error');
      }
    }

    function addFiles(files) {
      if (state.running || files.length === 0) return;
      const next = files.map((file) => ({
        id: `${file.name}-${file.size}-${file.lastModified}-${Math.random().toString(36).slice(2)}`,
        file,
        status: 'Bereit',
      }));
      state.files = state.files.concat(next);
      renderAll();
    }

    function clearFiles() {
      if (state.running) return;
      state.files = [];
      renderAll();
    }

    async function runFileInsert(settings) {
      if (!hasMiro()) {
        resetRun(0);
        addEntry('Nur in Miro verfuegbar', 'Die Dateien koennen lokal vorbereitet werden, das Einfuegen braucht ein Miro Board.', 'error');
        state.summary.failed = 1;
        renderAll();
        return;
      }

      if (state.files.length === 0) {
        resetRun(0);
        addEntry('Keine Dateien ausgewaehlt', 'Waehle zuerst lokale Bilddateien aus.', 'skipped');
        state.summary.skipped = 1;
        renderAll();
        return;
      }

      startRun();
      state.summary.total = state.files.length;
      renderAll();

      const columns = 3;
      const gap = 260;
      const startX = -gap;
      const startY = 0;

      try {
        for (let index = 0; index < state.files.length; index += 1) {
          if (state.cancelRequested) break;

          const fileItem = state.files[index];
          try {
            fileItem.status = 'Wird komprimiert';
            renderAll();

            const dataUrl = await readFileAsDataUrl(fileItem.file);
            const mime = getDataUrlMime(dataUrl);
            if (!settings.rasterizeSpecial && shouldSkipMime(mime)) {
              state.summary.skipped += 1;
              fileItem.status = 'Uebersprungen';
              addEntry(fileItem.file.name, `${mime} wurde nicht gerastert.`, 'skipped');
              continue;
            }

            const result = await compressDataUrl(dataUrl, settings);
            const savedBytes = result.originalBytes - result.compressedBytes;
            const url = settings.onlyIfSmaller && savedBytes <= 0 ? dataUrl : result.dataUrl;
            const width = Math.min(900, Math.max(180, result.targetWidth));

            fileItem.status = 'Wird eingefuegt';
            renderAll();

            await window.miro.board.createImage({
              title: fileItem.file.name,
              url,
              x: startX + (index % columns) * gap,
              y: startY + Math.floor(index / columns) * gap,
              width,
            });

            state.summary.done += 1;
            state.summary.savedBytes += Math.max(0, savedBytes);
            fileItem.status = 'Eingefuegt';
            addEntry(fileItem.file.name, `${formatBytes(result.originalBytes)} -> ${formatBytes(estimateDataUrlBytes(url))}.`, 'done');
          } catch (error) {
            state.summary.failed += 1;
            fileItem.status = 'Fehler';
            addEntry(fileItem.file.name, messageFrom(error), 'error');
          }
          renderAll();
          await wait(250);
        }

        notify(`Fertig: ${state.summary.done} komprimierte Bilder eingefuegt.`);
      } finally {
        finishRun();
      }
    }

    function readSettings() {
      const form = document.getElementById('settings-form');
      const data = new FormData(form);
      return {
        scope: data.get('scope') === 'board' ? 'board' : 'selection',
        maxEdge: clamp(Number(data.get('maxEdge')), 320, 4096),
        quality: clamp(Number(data.get('quality')) / 100, 0.45, 0.92),
        outputMode: data.get('keepPng') === 'on' ? 'png-for-png' : 'jpeg',
        backgroundColor: '#ffffff',
        onlyIfSmaller: data.get('onlyIfSmaller') === 'on',
        rasterizeSpecial: data.get('rasterizeSpecial') === 'on',
      };
    }

    async function compressDataUrl(dataUrl, settings) {
      const image = await loadImage(dataUrl);
      const sourceMime = getDataUrlMime(dataUrl);
      const outputMime = chooseOutputMime(sourceMime, settings.outputMode);
      const target = getTargetSize(image.naturalWidth, image.naturalHeight, settings.maxEdge);
      const canvas = document.createElement('canvas');
      canvas.width = target.width;
      canvas.height = target.height;

      const context = canvas.getContext('2d');
      if (!context) throw new Error('Canvas konnte nicht initialisiert werden.');

      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = 'high';

      if (outputMime === 'image/jpeg') {
        context.fillStyle = settings.backgroundColor;
        context.fillRect(0, 0, canvas.width, canvas.height);
      }

      context.drawImage(image, 0, 0, target.width, target.height);

      const compressedDataUrl = canvas.toDataURL(outputMime, settings.quality);
      return {
        dataUrl: compressedDataUrl,
        originalBytes: estimateDataUrlBytes(dataUrl),
        compressedBytes: estimateDataUrlBytes(compressedDataUrl),
        sourceMime,
        outputMime,
        sourceWidth: image.naturalWidth,
        sourceHeight: image.naturalHeight,
        targetWidth: target.width,
        targetHeight: target.height,
      };
    }

    function loadImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.decoding = 'async';
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error('Bild konnte nicht geladen werden.'));
        image.src = dataUrl;
      });
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden.'));
        reader.readAsDataURL(file);
      });
    }

    function getTargetSize(width, height, maxEdge) {
      if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) {
        throw new Error('Ungueltige Bildgroesse.');
      }
      const longestEdge = Math.max(width, height);
      const scale = Math.min(1, maxEdge / longestEdge);
      return {
        width: Math.max(1, Math.round(width * scale)),
        height: Math.max(1, Math.round(height * scale)),
        scale,
      };
    }

    function getDataUrlMime(dataUrl) {
      const match = /^data:([^;,]+)[;,]/i.exec(dataUrl);
      return (match?.[1] || 'application/octet-stream').toLowerCase();
    }

    function estimateDataUrlBytes(dataUrl) {
      const base64 = dataUrl.split(',')[1] || '';
      const padding = base64.endsWith('==') ? 2 : base64.endsWith('=') ? 1 : 0;
      return Math.max(0, Math.floor((base64.length * 3) / 4) - padding);
    }

    function shouldSkipMime(mime) {
      return mime === 'image/gif' || mime === 'image/svg+xml';
    }

    function chooseOutputMime(sourceMime, outputMode) {
      return outputMode === 'png-for-png' && sourceMime === 'image/png' ? 'image/png' : 'image/jpeg';
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes < 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      let value = bytes;
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit += 1;
      }
      const digits = value >= 10 || unit === 0 ? 0 : 1;
      return `${value.toFixed(digits)} ${units[unit]}`;
    }

    function startRun() {
      state.running = true;
      state.cancelRequested = false;
      state.summary = { total: 0, done: 0, skipped: 0, failed: 0, savedBytes: 0 };
      state.entries = [];
      renderAll();
    }

    function resetRun(total) {
      state.summary = { total, done: 0, skipped: 0, failed: 0, savedBytes: 0 };
      state.entries = [];
    }

    function finishRun() {
      state.running = false;
      state.cancelRequested = false;
      refreshSelectionCount();
      renderAll();
    }

    function addEntry(title, detail, status) {
      state.entries.push({
        id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
        title,
        detail,
        status,
      });
      if (state.entries.length > 30) state.entries.shift();
    }

    function renderAll() {
      const processed = state.summary.done + state.summary.skipped + state.summary.failed;
      const percent = state.summary.total > 0 ? Math.round((processed / state.summary.total) * 100) : 0;

      els['tab-board'].classList.toggle('active', state.mode === 'board');
      els['tab-upload'].classList.toggle('active', state.mode === 'upload');
      els['board-panel'].classList.toggle('hidden', state.mode !== 'board');
      els['upload-panel'].classList.toggle('hidden', state.mode !== 'upload');
      els['scope-fieldset'].classList.toggle('hidden', state.mode !== 'board');

      els['metric-selection'].textContent = String(state.selectedCount);
      els['metric-done'].textContent = String(state.summary.done);
      els['metric-saved'].textContent = formatBytes(state.summary.savedBytes);
      els['progress-label'].textContent = state.running ? `${processed}/${state.summary.total}` : state.summary.total > 0 ? 'Fertig' : 'Bereit';
      els['progress-percent'].textContent = `${percent}%`;
      els['progress-fill'].style.width = `${percent}%`;
      els['summary-skipped'].textContent = `${state.summary.skipped} uebersprungen`;
      els['summary-failed'].textContent = `${state.summary.failed} Fehler`;

      const disabled = state.running;
      for (const selector of ['button', 'input']) {
        document.querySelectorAll(selector).forEach((element) => {
          if (element.id === 'cancel-button') return;
          element.disabled = disabled;
        });
      }
      els['cancel-button'].disabled = !state.running;

      renderFiles();
      renderLog();
    }

    function renderFiles() {
      if (state.files.length === 0) {
        els['file-list'].innerHTML = '<li class="empty">Noch keine Dateien ausgewaehlt.</li>';
        return;
      }

      els['file-list'].innerHTML = state.files.map((item) => `
        <li class="file-row">
          <div>
            <strong>${escapeHtml(item.file.name)}</strong>
            <span>${formatBytes(item.file.size)} · ${escapeHtml(item.status)}</span>
          </div>
          <button class="mini-button" type="button" data-remove-file="${escapeHtml(item.id)}" ${state.running ? 'disabled' : ''}>Entfernen</button>
        </li>
      `).join('');

      document.querySelectorAll('[data-remove-file]').forEach((button) => {
        button.addEventListener('click', () => {
          state.files = state.files.filter((item) => item.id !== button.dataset.removeFile);
          renderAll();
        });
      });
    }

    function renderLog() {
      if (state.entries.length === 0) {
        els['log-list'].innerHTML = '<li class="empty">Noch keine Aktion gestartet.</li>';
        return;
      }

      els['log-list'].innerHTML = state.entries.slice().reverse().map((entry) => `
        <li class="log-row ${entry.status}">
          <span class="log-dot"></span>
          <div>
            <strong>${escapeHtml(entry.title)}</strong>
            <p>${escapeHtml(entry.detail)}</p>
          </div>
        </li>
      `).join('');
    }

    function isImageItem(item) {
      return item?.type === 'image' && typeof item.getDataUrl === 'function';
    }

    function hasMiro() {
      return isEmbedded() && typeof window.miro !== 'undefined' && window.miro?.board;
    }

    function isEmbedded() {
      try {
        return window.self !== window.top;
      } catch {
        return true;
      }
    }

    function notify(message) {
      if (hasMiro() && window.miro.board.notifications?.showInfo) {
        window.miro.board.notifications.showInfo(message).catch(() => {});
      }
    }

    function messageFrom(error) {
      return error instanceof Error ? error.message : 'Unbekannter Fehler.';
    }

    function clamp(value, min, max) {
      if (!Number.isFinite(value)) return min;
      return Math.min(max, Math.max(min, value));
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
